---
# hetzner-k3s cluster configuration
#
# Before running:
#   1. export HCLOUD_TOKEN=your-token-here
#   2. Replace YOUR_IP/32 below with your public IP (curl -4 ifconfig.me)
#   3. Ensure ~/.ssh/id_ed25519 exists (or: ssh-keygen -t ed25519)
#   4. Run: hetzner-k3s create --config cluster.yaml

cluster_name: k3s
kubeconfig_path: "~/.kube/config"
k3s_version: v1.32.12+k3s1

networking:
  ssh:
    port: 22
    use_agent: false
    public_key_path: "~/.ssh/id_ed25519.pub"
    private_key_path: "~/.ssh/id_ed25519"
  allowed_networks:
    ssh:
      - 62.250.203.213/32       # Replace with your public IP
    api:
      - 62.250.203.213/32       # Replace with your public IP
  public_network:
    ipv4: true
    ipv6: true
  private_network:
    enabled: true
    subnet: 10.0.0.0/16
  cni:
    enabled: true
    encryption: false
    mode: flannel
  cluster_cidr: 10.244.0.0/16
  service_cidr: 10.43.0.0/16
  cluster_dns: 10.43.0.10

datastore:
  mode: etcd

schedule_workloads_on_masters: false
protect_against_deletion: true

create_load_balancer_for_the_kubernetes_api: true

image: ubuntu-24.04

masters_pool:
  instance_type: cx23
  instance_count: 3
  locations:
    - nbg1
    - nbg1
    - nbg1

worker_node_pools:
  - name: workers
    instance_type: cx33
    instance_count: 2
    location: nbg1

addons:
  csi_driver:
    enabled: true
  cloud_controller_manager:
    enabled: true
  system_upgrade_controller:
    enabled: true
  cluster_autoscaler:
    enabled: false
  traefik:
    enabled: true
  servicelb:
    enabled: false
  metrics_server:
    enabled: true
  embedded_registry_mirror:
    enabled: false
