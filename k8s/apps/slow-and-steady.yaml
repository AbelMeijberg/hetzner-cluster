apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: slow-and-steady
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: site=ghcr.io/lottelutkenhaus/slow-and-steady-website
    argocd-image-updater.argoproj.io/site.update-strategy: newest-build
    argocd-image-updater.argoproj.io/site.allow-tags: "regexp:^sha-"
    argocd-image-updater.argoproj.io/site.pull-secret: argocd/ghcr-pull-secret
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/AbelMeijberg/hetzner-cluster.git
    targetRevision: HEAD
    path: k8s/manifests/slow-and-steady
  destination:
    server: https://kubernetes.default.svc
    namespace: slow-and-steady
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
