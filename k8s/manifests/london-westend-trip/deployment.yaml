apiVersion: apps/v1
kind: Deployment
metadata:
  name: london-westend-trip
  namespace: london-westend-trip
spec:
  replicas: 1
  selector:
    matchLabels:
      app: london-westend-trip
  template:
    metadata:
      labels:
        app: london-westend-trip
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: london-westend-trip
          image: ghcr.io/abelmeijberg/london-westend-trip:latest
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /
              port: 8080
          readinessProbe:
            httpGet:
              path: /
              port: 8080
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
