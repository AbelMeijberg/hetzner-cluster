apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-admin
  namespace: forgejo
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: forgejo-admin
    template:
      data:
        username: forgejo_admin
        password: "{{ .admin_password }}"
  data:
    - secretKey: admin_password
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: forgejo
        metadataPolicy: None
        property: admin_password
