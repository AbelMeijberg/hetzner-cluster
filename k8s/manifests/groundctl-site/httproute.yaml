apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: groundctl-site
  namespace: groundctl-site
spec:
  parentRefs:
    - name: main-gateway
      namespace: gateway
      sectionName: groundctl-dev
    - name: main-gateway
      namespace: gateway
      sectionName: www-groundctl-dev
  rules:
    - backendRefs:
        - name: groundctl-site
          port: 80
