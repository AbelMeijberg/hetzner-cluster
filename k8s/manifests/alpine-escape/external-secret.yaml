apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-pull-secret
  namespace: alpine-escape
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: ghcr-pull-secret
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"ghcr.io":{"auth":"{{ printf "abelmeijberg:%s" .pat | b64enc }}","username":"abelmeijberg","password":"{{ .pat }}"}}}
  data:
    - secretKey: pat
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: ghcr
        metadataPolicy: None
        property: pat
