apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: london-westend-trip
  namespace: argocd
spec:
  namespace: argocd
  applicationRefs:
    - namePattern: london-westend-trip
      images:
        - alias: site
          imageName: ghcr.io/abelmeijberg/london-westend-trip
          commonUpdateSettings:
            updateStrategy: newest-build
            allowTags: "regexp:^sha-"
            pullSecret: pullsecret:argocd/ghcr-pull-secret
