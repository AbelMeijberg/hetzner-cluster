apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: slow-and-steady
  namespace: argocd
spec:
  namespace: argocd
  applicationRefs:
    - namePattern: slow-and-steady
      images:
        - alias: site
          imageName: ghcr.io/lottelutkenhaus/slow-and-steady-website
          commonUpdateSettings:
            updateStrategy: newest-build
            allowTags: "regexp:^sha-"
            pullSecret: pullsecret:argocd/ghcr-pull-secret
