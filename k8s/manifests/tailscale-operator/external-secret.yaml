apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: operator-oauth
  namespace: tailscale
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: operator-oauth
  data:
    - secretKey: client_id
      remoteRef:
        key: tailscale-operator
        property: client_id
    - secretKey: client_secret
      remoteRef:
        key: tailscale-operator
        property: client_secret
